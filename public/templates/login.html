<section class="auth-shell">
  <div class="container-fluid px-0">
    <div class="row g-4 align-items-stretch auth-layout">
      <div class="col-lg-7">
        <div class="auth-panel auth-panel--soft h-100 d-flex flex-column justify-content-between">
          <div>
            <p class="section-label">Workspace</p>
            <h1 class="auth-display mb-3">A focused AI workspace for notes and conversation.</h1>
            <p class="muted-copy auth-copy mb-0">
              Sign in to continue your chats and use natural language to remember important details.
            </p>
          </div>

          <div class="auth-meta">
            <div class="auth-meta-item">
              <i class="hgi-stroke hgi-bubble-chat auth-meta-icon"></i>
              <span>Chat-first workflow</span>
            </div>
            <div class="auth-meta-item">
              <i class="hgi-stroke hgi-note-01 auth-meta-icon"></i>
              <span>Memory tools built into the assistant</span>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="auth-panel auth-card card-surface">
          <div class="mb-4">
            <p class="section-label">Sign In</p>
            <h2>Welcome back</h2>
          </div>

          <form class="auth-form" data-auth-mode="login" ng-submit="vm.login($event)" novalidate>
            <p class="auth-form-error" ng-if="vm.warning">{{ vm.warning }}</p>

            <div class="mb-3">
              <label for="login-email" class="form-label">Email</label>
              <input
                id="login-email"
                name="email"
                type="email"
                class="form-control"
                ng-model="vm.form.email"
                autocomplete="email"
                autocapitalize="none"
                spellcheck="false"
                enterkeyhint="next"
                required
              />
            </div>

            <div class="mb-4">
              <label for="login-password" class="form-label">Password</label>
              <input
                id="login-password"
                name="password"
                type="password"
                class="form-control"
                ng-model="vm.form.password"
                autocomplete="current-password"
                enterkeyhint="go"
                required
                minlength="4"
              />
            </div>

            <div class="d-flex flex-column gap-3">
              <button type="submit" class="btn btn-primary btn-lg auth-submit" ng-disabled="vm.loading">
                <i class="hgi-stroke hgi-arrow-right-02 me-2"></i>
                {{ vm.loading ? "Logging in..." : "Login" }}
              </button>
              <div class="auth-switch">
                <span class="muted-copy">New here?</span>
                <a href="/register" class="btn btn-outline-dark">Create account</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
