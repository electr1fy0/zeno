<!doctype html>
<html lang="en" ng-app="zenoApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeno</title>
    <link
      rel="stylesheet"
      href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css"
    />
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body ng-controller="AppController as app">
    <div class="app-shell">
      <header class="topbar" ng-if="app.showHeader">
        <div>
          <a href="/chat" class="brand">Zeno</a>
        </div>
        <div class="topbar-actions" ng-if="app.currentUser">
          <span class="user-chip">{{ app.currentUser.email }}</span>
          <button class="btn btn-outline-light btn-sm" ng-click="app.logout()">
            <i class="hgi-stroke hgi-logout-03 me-1"></i>
            Logout
          </button>
        </div>
      </header>

      <main class="page-frame" ng-class="{ 'page-frame--chat': !app.showHeader }">
        <section
          class="content-panel"
          ng-class="{ 'content-panel--chat': !app.showHeader }"
        >
          <div
            class="alert alert-danger m-3"
            ng-if="app.flashMessage"
            role="alert"
          >
            {{ app.flashMessage }}
          </div>
          <div ng-view></div>
        </section>
      </main>
    </div>

    <script src="/vendor/jquery/jquery.min.js"></script>
    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/angular/angular.min.js"></script>
    <script src="/vendor/angular-route/angular-route.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
